<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김민규 · 포트폴리오</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">

    <!-- ── Hero ── -->
    <section class="hero">
      <div class="container">
        <div class="hero-inner">
          <div class="hero-left">
            <span class="hero-tag">AI 개발자 · 데이터 파이프라인 엔지니어</span>
            <h1 class="hero-name" id="hero-name">김민규</h1>
            <p class="hero-desc" id="hero-desc"></p>
            <div id="hero-skills" class="skill-pills"></div>
            <div class="hero-contact">
              <a id="contact-email" class="contact-link" href="#">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                </svg>
                <span id="contact-email-text"></span>
              </a>
            </div>
            <p id="contact-note" class="contact-note"></p>
          </div>
          <div class="hero-right">
            <div id="stats-grid" class="stats-grid"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Projects ── -->
    <section class="projects-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">프로젝트</h2>
          <p class="section-sub">이전 직장에서 담당한 개발 프로젝트 · 보안 계약에 따라 서비스명·고객사·서버 도메인 비공개</p>
        </div>
        <div id="filter-tabs" class="filter-tabs"></div>
        <div id="project-grid" class="project-grid"></div>
      </div>
    </section>

  </div><!-- /#app -->

  <!-- ── Modal ── -->
  <div id="modal-overlay" class="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">

      <button id="modal-close" class="modal-close" aria-label="닫기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <div id="modal-header" class="modal-header cat-backend">
        <div class="modal-header-meta">
          <span id="modal-num" class="modal-num"></span>
          <span id="modal-badge" class="modal-badge"></span>
          <span id="modal-category" class="modal-category-pill"></span>
        </div>
        <h2 id="modal-title" class="modal-title"></h2>
        <p id="modal-subtitle" class="modal-subtitle"></p>
      </div>

      <div class="modal-tabs" id="modal-tabs">
        <button class="tab-btn active" data-tab="overview">개요</button>
        <button class="tab-btn" data-tab="architecture">구조</button>
        <button class="tab-btn" data-tab="contribution">기여</button>
        <button class="tab-btn" data-tab="results">성과 &amp; 스택</button>
      </div>

      <div class="modal-body">
        <div id="tab-overview"      class="tab-pane active"></div>
        <div id="tab-architecture"  class="tab-pane"></div>
        <div id="tab-contribution"  class="tab-pane"></div>
        <div id="tab-results"       class="tab-pane"></div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
